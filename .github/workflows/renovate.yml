name: Renovate

on:
  workflow_dispatch:
  schedule:
    # Run at 23:00 UTC Sunday = 08:00 JST Monday — matches renovate.json schedule
    - cron: "0 23 * * 0"
  push:
    branches: [main]
    paths:
      - "renovate.json"
      - ".github/workflows/renovate.yml"

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  check:
    name: Check for dependency updates

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: renovatebot/github-action@v46.1.5
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_GIT_AUTHOR: "NexPB <lorenzo@nexp.be>"
